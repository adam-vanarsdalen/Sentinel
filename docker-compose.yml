services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      # Ensure container uses service hostnames
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      APP_VERSION: ${APP_VERSION:-0.1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz').read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      APP_VERSION: ${APP_VERSION:-0.1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
    command: ["celery", "-A", "app.worker.celery", "worker", "-l", "info"]

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-0.1.0}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./config:/config:ro
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
