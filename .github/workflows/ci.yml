name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  release-validation:
    name: Release validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - backend-tests
      - frontend-lint
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release validation
        env:
          APP_VERSION: ci-${{ github.sha }}
          ARTIFACTS_DIR: artifacts/validate-release
          COMPOSE_PROJECT_NAME: sentinel_ci
          BACKEND_PORT: "18000"
          FRONTEND_PORT: "13000"
        run: ./scripts/validate_release.sh

      - name: Upload validation artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-artifacts
          path: |
            artifacts/validate-release
          if-no-files-found: warn
