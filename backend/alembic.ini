[alembic]
script_location = alembic
# The real DB URL is injected via the DATABASE_URL environment variable and set in `alembic/env.py`.
# Keep a non-interpolated placeholder here to avoid configparser interpolation errors.
sqlalchemy.url = postgresql+psycopg://sentinel:sentinel@localhost:5432/sentinel

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
